<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Health Monitoring System</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

header{
    background:#0077ff;
    color:white;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
    color:#0077ff;
}

.value{
    font-size:40px;
    font-weight:bold;
    color:#222;
}

.status{
    font-size:20px;
    margin-top:10px;
    color:green;
}

footer{
    text-align:center;
    padding:15px;
    background:#0077ff;
    color:white;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
Smart Health Monitoring Dashboard
</header>

<div class="container">

<div class="card">
<h2>Heart Rate</h2>
<div class="value" id="bpm">78 BPM</div>
<div class="status">Normal</div>
</div>

<div class="card">
<h2>SpO2 Level</h2>
<div class="value" id="spo2">98%</div>
<div class="status">Healthy</div>
</div>

<div class="card">
<h2>Body Temperature</h2>
<div class="value" id="temp">36.8 °C</div>
<div class="status">Normal</div>
</div>

<div class="card">
<h2>Patient Status</h2>
<div class="value" style="font-size:30px;">Stable</div>
<div class="status">All Parameters Normal </div>
</div>

</div>

<footer>
IoT Health Monitoring Project using ESP32
</footer>

<script>
setInterval(function(){

document.getElementById("bpm").innerHTML =
Math.floor(Math.random()*20)+70 + " BPM";

document.getElementById("spo2").innerHTML =
Math.floor(Math.random()*3)+97 + "%";

document.getElementById("temp").innerHTML =
(36 + Math.random()).toFixed(1) + " °C";

},2000);
</script>

</body>
</html>
